<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>
</head>
<body>

<h1>{{ page.title }}</h1>

<p><strong>Nombre científico:</strong> {{ page.cientifico }}</p>
<p><strong>Categoría:</strong> {{ page.categoria }}</p>
<p><strong>Subcategoría:</strong> {{ page.subcategoria }}</p>
<p><strong>Ubicación:</strong> {{ page.ubicacion }}</p>

<p>{{ page.descripcion }}</p>

{% for img in page.imagenes %} <img src="{{ img }}" style="max-width:600px;">
{% endfor %}

</body>
</html>
