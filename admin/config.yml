backend:
  name: github
  repo: insecterik/insecterik.github.io
  branch: main
  base_url: https://insecterik-cms-auth.thomm99gt.workers.dev

site_url: https://insecterik.github.io
display_url: https://insecterik.github.io

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # NIVEL 1 — REINO (Animalia, Plantae, Fungi...)
  - name: "reinos"
    label: "Reino"
    folder: "content/reinos"
    create: true
    slug: "{{slug}}"

    fields:
      - label: "Nombre"
        name: "title"
        widget: "string"

      - label: "Descripción"
        name: "descripcion"
        widget: "text"
        required: false

      - label: "Imagen"
        name: "imagen"
        widget: "image"
        required: false

  # NIVEL 2 — GRUPO PRINCIPAL (Aves, Mamíferos, Mariposas, Árboles, Helechos...)
  - name: "grupos"
    label: "Grupo Principal"
    folder: "content/grupos"
    create: true
    slug: "{{slug}}"

    fields:
      - label: "Nombre"
        name: "title"
        widget: "string"

      - label: "Reino"
        name: "reino"
        widget: "relation"
        collection: "reinos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Descripción"
        name: "descripcion"
        widget: "text"
        required: false

      - label: "Imagen"
        name: "imagen"
        widget: "image"
        required: false

  # NIVEL 3 — SUBGRUPO
  - name: "subgrupos"
    label: "Subgrupo"
    folder: "content/subgrupos"
    create: true
    slug: "{{slug}}"

    fields:
      - label: "Nombre"
        name: "title"
        widget: "string"

      - label: "Reino"
        name: "reino"
        widget: "relation"
        collection: "reinos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Grupo Principal"
        name: "grupo"
        widget: "relation"
        collection: "grupos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Descripción"
        name: "descripcion"
        widget: "text"
        required: false

      - label: "Imagen"
        name: "imagen"
        widget: "image"
        required: false

  # NIVEL 4 — CATEGORÍA
  - name: "categorias"
    label: "Categorías"
    folder: "content/categorias"
    create: true
    slug: "{{slug}}"

    fields:
      - label: "Nombre"
        name: "title"
        widget: "string"

      - label: "Reino"
        name: "reino"
        widget: "relation"
        collection: "reinos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Grupo Principal"
        name: "grupo"
        widget: "relation"
        collection: "grupos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Subgrupo"
        name: "subgrupo"
        widget: "relation"
        collection: "subgrupos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Descripción"
        name: "descripcion"
        widget: "text"
        required: false

      - label: "Imagen"
        name: "imagen"
        widget: "image"
        required: false

  # NIVEL 5 — SUBCATEGORÍA
  - name: "subcategorias"
    label: "Subcategorías"
    folder: "content/subcategorias"
    create: true
    slug: "{{slug}}"

    fields:
      - label: "Nombre"
        name: "title"
        widget: "string"

      - label: "Reino"
        name: "reino"
        widget: "relation"
        collection: "reinos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Grupo Principal"
        name: "grupo"
        widget: "relation"
        collection: "grupos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Subgrupo"
        name: "subgrupo"
        widget: "relation"
        collection: "subgrupos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Categoría"
        name: "categoria"
        widget: "relation"
        collection: "categorias"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Descripción"
        name: "descripcion"
        widget: "text"
        required: false

      - label: "Imagen"
        name: "imagen"
        widget: "image"
        required: false

  # NIVEL 6 — ESPECIES
  - name: "especies"
    label: "Especies"
    folder: "content/especies"
    create: true
    slug: "{{slug}}"

    fields:

      - label: "Nombre común"
        name: "title"
        widget: "string"

      - label: "Nombre científico"
        name: "cientifico"
        widget: "string"
        required: false

      - label: "Reino"
        name: "reino"
        widget: "relation"
        collection: "reinos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Grupo Principal"
        name: "grupo"
        widget: "relation"
        collection: "grupos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Subgrupo"
        name: "subgrupo"
        widget: "relation"
        collection: "subgrupos"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Categoría"
        name: "categoria"
        widget: "relation"
        collection: "categorias"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Subcategoría"
        name: "subcategoria"
        widget: "relation"
        collection: "subcategorias"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false

      - label: "Descripción"
        name: "descripcion"
        widget: "text"

      - label: "Fecha de observación"
        name: "fecha"
        widget: "datetime"
        required: false

      - label: "Ubicación"
        name: "ubicacion"
        widget: "string"
        required: false

      - label: "Galería"
        name: "imagenes"
        widget: "list"
        field:
          label: "Imagen"
          name: "imagen"
          widget: "image"

  # COLECCIONES — listas manuales de especies (ej: "Especies en peligro", "Avistamientos 2026")
  # Independiente de la jerarquía de Reino/Grupo/Subgrupo/Categoría/Subcategoría.
  - name: "colecciones"
    label: "Colecciones"
    folder: "content/colecciones"
    create: true
    slug: "{{slug}}"

    fields:
      - label: "Nombre de la colección"
        name: "title"
        widget: "string"

      - label: "Descripción"
        name: "descripcion"
        widget: "text"
        required: false

      - label: "Imagen de portada"
        name: "imagen"
        widget: "image"
        required: false

      - label: "Especies en esta colección"
        name: "especies"
        widget: "list"
        required: false
        field:
          label: "Especie"
          name: "especie"
          widget: "relation"
          collection: "especies"
          search_fields: ["title"]
          value_field: "title"
          display_fields: ["title"]