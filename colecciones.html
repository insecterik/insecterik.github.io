<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colecciones &middot; Biodiversidad de Tibirita</title>
<link rel="icon" type="image/png" href="images/uploads/favicon.png">

<style>
  :root{
    --verde-oscuro:#1c3f3a;
    --verde-header:#16332f;
    --verde-brillante:#2ecc71;
    --verde-texto:#1b5e20;
    --crema:#f4f8f2;
    --gris-texto:#5a6b66;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:var(--crema);
    color:#222;
  }

  a{ text-decoration:none; }

  /* ===== HEADER ===== */
  .top-header{
    background:var(--verde-header);
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 40px;
    flex-wrap:wrap;
    gap:12px;
  }

  .logo{ display:flex; align-items:center; gap:10px; }

  .logo-img{ height:96px; width:96px; object-fit:contain; border-radius:6px; }

  .logo-text{ display:flex; align-items:center; line-height:1; }

    .logo{
    color:var(--verde-brillante);
    font-weight:800;
    font-size:22px;
    letter-spacing:1px;
    }

  .top-nav{
    display:flex;
    align-items:center;
    gap:28px;
  }

  .top-nav a{
    color:#dfe9e6;
    font-size:13px;
    letter-spacing:.5px;
    text-transform:uppercase;
    font-weight:600;
  }

  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:var(--verde-brillante) !important;
  }

  /* ===== PAGE HEADER ===== */
  .page-header{
    max-width:1200px;
    margin:50px auto 10px;
    padding:0 24px;
  }

  .page-header h1{
    font-size:52px;
    font-weight:800;
    color:var(--verde-brillante);
    margin:0 0 12px;
  }

  .page-header .subtitle{
    font-size:22px;
    color:#9fb3ad;
    font-weight:300;
    margin:0 0 8px;
    max-width:700px;
    line-height:1.4;
  }

  .page-header .subtitle strong{
    color:#3c4a46;
    font-weight:700;
  }

  /* ===== GRID DE COLECCIONES ===== */
  .collections-grid{
    max-width:1200px;
    margin:34px auto 70px;
    padding:0 24px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:24px;
  }

  @media (max-width:900px){
    .collections-grid{ grid-template-columns:repeat(2, 1fr); }
  }
  @media (max-width:600px){
    .collections-grid{ grid-template-columns:1fr; }
  }

  .collection-card{
    position:relative;
    display:block;
    height:300px;
    border-radius:18px;
    overflow:hidden;
    background:#dfe9e6 linear-gradient(135deg, #2c5a52, #16332f);
    box-shadow:0 6px 20px rgba(0,0,0,.12);
    transition:transform .2s ease, box-shadow .2s ease;
  }

  .collection-card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 28px rgba(0,0,0,.18);
  }

  .collection-card img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transition:transform .35s ease;
  }

  .collection-card:hover img{
    transform:scale(1.06);
  }

  .collection-card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(8,18,16,.85) 0%, rgba(8,18,16,.25) 55%, rgba(8,18,16,0) 100%);
  }

  .collection-card .card-text{
    position:absolute;
    left:0; right:0; bottom:0;
    padding:20px;
    color:white;
    z-index:1;
  }

  .collection-card .card-text h3{
    margin:0 0 4px;
    font-size:22px;
    font-weight:800;
    line-height:1.2;
  }

  .collection-card .card-text .count{
    font-size:13px;
    color:#cfe9df;
    font-weight:600;
  }

  .empty-state{
    grid-column:1/-1;
    padding:60px 24px;
    text-align:center;
    color:var(--gris-texto);
    font-size:15px;
  }

  footer{
    text-align:center;
    color:var(--gris-texto);
    font-size:13px;
    padding:24px;
  }

  @media (max-width:700px){
    .top-header{ padding:14px 20px; }
    .top-nav a{ display:none; }
    .page-header{ margin:34px auto 6px; }
    .page-header h1{ font-size:36px; }
    .page-header .subtitle{ font-size:17px; }
  }
</style>
</head>
<body>

<div class="top-header">
  <a class="logo" href="/"><img src="images/uploads/logo.png" alt="InsectErik logo" class="logo-img"><span class="logo-text">InsectErik</span></a>
  <div class="top-nav">
    <a class="back-link" href="/">&#8592; Volver al catálogo</a>
  </div>
</div>

<div class="page-header">
  <h1>Colecciones</h1>
  <p class="subtitle"><strong>Todo</strong> lo que quieres saber acerca de la fauna de Tibirita, organizado en colecciones temáticas.</p>
</div>

<div class="collections-grid" id="collectionsGrid">
  <div class="empty-state">Cargando colecciones&hellip;</div>
</div>

<footer>
  Biodiversidad de Tibirita &middot; Catálogo de fauna observada en Tibirita, Cundinamarca
</footer>

<script>
(function(){
  'use strict';

  // ── CONFIG: mismo repo que usa index.html ──
  var GH_USER   = 'insecterik';
  var GH_REPO   = 'insecterik.github.io';
  var GH_BRANCH = 'main';
  var GH_API    = 'https://api.github.com/repos/' + GH_USER + '/' + GH_REPO + '/contents/';
  var GH_RAW    = 'https://raw.githubusercontent.com/' + GH_USER + '/' + GH_REPO + '/' + GH_BRANCH + '/';

  // ── MINI PARSER DE FRONT MATTER YAML (igual al de index.html / especie.html) ──
  function parseFrontMatter(raw) {
    raw = raw.replace(/\r\n/g, '\n');
    var match = /^---\s*\n([\s\S]*?)\n---/.exec(raw);
    if (!match) return {};
    var lines = match[1].split('\n');
    var data = {};
    var currentKey = null;

    lines.forEach(function (line) {
      if (!line.trim()) return;

      var listItem = /^\s*-\s+(.*)$/.exec(line);
      if (listItem && currentKey) {
        if (!Array.isArray(data[currentKey])) data[currentKey] = [];
        var itemText = listItem[1];
        // Si el item es "clave: valor" (lista de objetos de un solo campo, ej: "- especie: monarca"),
        // extraemos solo el valor.
        var nested = /^[A-Za-z0-9_]+:\s*(.*)$/.exec(itemText);
        data[currentKey].push(cleanValue(nested ? nested[1] : itemText));
        return;
      }

      var kv = /^([A-Za-z0-9_]+):\s*(.*)$/.exec(line);
      if (kv) {
        var key = kv[1];
        var val = kv[2].trim();
        if (val === '') {
          currentKey = key;
          data[key] = [];
        } else {
          data[key] = cleanValue(val);
          currentKey = null;
        }
      }
    });

    return data;
  }

  function cleanValue(v) {
    v = v.trim();
    if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
      v = v.slice(1, -1);
    }
    return v;
  }

  function slugify(str) {
    return (str || '')
      .toString()
      .trim()
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '');
  }

  function listMdFiles(folder) {
    return fetch(GH_API + folder + '?ref=' + GH_BRANCH)
      .then(function (r) {
        if (!r.ok) throw new Error('No se pudo listar ' + folder + ' (HTTP ' + r.status + ')');
        return r.json();
      })
      .then(function (items) {
        return (items || [])
          .filter(function (it) { return it.type === 'file' && /\.md$/i.test(it.name); })
          .map(function (it) { return folder + '/' + it.name; });
      });
  }

  function fetchAndParseAll(paths) {
    return Promise.all(paths.map(function (path) {
      return fetch(GH_RAW + path + '?v=' + Date.now())
        .then(function (r) {
          if (!r.ok) throw new Error('No se pudo leer ' + path);
          return r.text();
        })
        .then(function (raw) {
          var fm = parseFrontMatter(raw);
          fm.__path = path;
          return fm;
        });
    }));
  }

  // ── CARGA DE COLECCIONES DESDE content/colecciones/*.md ──
  listMdFiles('content/colecciones')
    .then(fetchAndParseAll)
    .then(function (rawColecciones) {
      var collections = rawColecciones.map(function (c) {
        var especiesList = Array.isArray(c.especies) ? c.especies
                          : (c.especies ? [c.especies] : []);
        return {
          id: slugify(c.title) + '-' + slugify(c.__path),
          name: c.title || '(sin nombre)',
          description: c.descripcion || '',
          image: c.imagen || '',
          count: especiesList.length
        };
      });

      renderGrid(collections);
    })
    .catch(function (err) {
      console.error(err);
      document.getElementById('collectionsGrid').innerHTML =
        '<div class="empty-state">No se pudieron cargar las colecciones desde GitHub. ' +
        'Revisa la consola del navegador (F12) para más detalles, y verifica que la carpeta ' +
        '<code>content/colecciones</code> exista en el repositorio.</div>';
    });

  function renderGrid(collections) {
    var grid = document.getElementById('collectionsGrid');

    if (!collections.length) {
      grid.innerHTML = '<div class="empty-state">Todavía no hay colecciones creadas. Puedes crear la primera desde el panel de administración.</div>';
      return;
    }

    var html = '';
    collections.forEach(function (c) {
      html += '<a class="collection-card" href="coleccion.html?id=' + encodeURIComponent(c.id) + '">';
      if (c.image) {
        html += '<img src="' + c.image + '" alt="' + c.name + '">';
      }
      html += '<div class="card-text">' +
                '<h3>' + c.name + '</h3>' +
                '<span class="count">' + c.count + ' especie' + (c.count !== 1 ? 's' : '') + '</span>' +
              '</div>';
      html += '</a>';
    });

    grid.innerHTML = html;
  }
})();
</script>

</body>
</html>
