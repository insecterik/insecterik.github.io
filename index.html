<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodiversidad de Tibirita</title>

<style>
  :root{
    --verde-oscuro:#1c3f3a;
    --verde-header:#16332f;
    --verde-brillante:#2ecc71;
    --verde-texto:#1b5e20;
    --crema:#f4f8f2;
    --gris-texto:#5a6b66;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:var(--crema);
    color:#222;
  }

  a{ text-decoration:none; }

  /* ===== HEADER ===== */
  .top-header{
    background:var(--verde-header);
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 40px;
    flex-wrap:wrap;
    gap:12px;
  }

  .logo{
    color:var(--verde-brillante);
    font-weight:800;
    font-size:22px;
    letter-spacing:1px;
    text-transform:uppercase;
  }

  .top-nav{
    display:flex;
    align-items:center;
    gap:28px;
  }

  .top-nav a{
    color:#dfe9e6;
    font-size:13px;
    letter-spacing:.5px;
    text-transform:uppercase;
    font-weight:600;
  }

  .search-box{
    display:flex;
    align-items:center;
    background:rgba(255,255,255,.12);
    border-radius:20px;
    padding:6px 6px 6px 16px;
  }

  .search-box input{
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:13px;
    width:120px;
  }

  .search-box input::placeholder{ color:#cfd9d6; }

  .search-box button{
    background:var(--verde-brillante);
    border:none;
    border-radius:50%;
    width:30px;
    height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--verde-header);
    cursor:pointer;
  }

  /* ===== HERO ===== */
  .hero{
    position:relative;
    width:100%;
    background:
      linear-gradient(120deg, rgba(22,51,47,.92) 35%, rgba(20,41,37,.45) 100%),
      url('images/uploads/portada.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    color:white;
    padding:0 60px;
    min-height:88vh;
    display:flex;
    align-items:center;
    overflow:hidden;
  }

  .hero::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      radial-gradient(circle at 80% 30%, rgba(46,204,113,.15), transparent 60%);
    pointer-events:none;
  }

  .hero-inner{
    max-width:1200px;
    margin:0 auto;
    width:100%;
    position:relative;
  }

  .hero h1{
    font-size:76px;
    font-weight:800;
    line-height:1.05;
    margin:0 0 18px;
    letter-spacing:-1px;
  }

  .hero .subtitle{
    font-size:26px;
    color:#ffffff;
    font-weight:300;
    margin:0 0 38px;
    max-width:680px;
    line-height:1.4;
  }

  .hero-stats{
    display:flex;
    gap:32px 40px;
    flex-wrap:wrap;
    font-size:17px;
    color:#ffffff;
  }

  .hero-stats strong{
    color:var(--verde-brillante);
    font-size:24px;
    margin-right:6px;
    font-weight:800;
  }

  /* ===== SECTION TITLE ===== */
  .section-title{
    max-width:1200px;
    margin:50px auto 24px;
    padding:0 20px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }

  .section-title h2{
    color:var(--verde-brillante);
    background:var(--verde-oscuro);
    display:inline-block;
    padding:8px 18px;
    border-radius:6px;
    font-size:18px;
    letter-spacing:1px;
    margin:0;
  }

  .section-title span{
    color:var(--gris-texto);
    font-size:14px;
  }

  /* ===== GALLERY ===== */
  .container{
    max-width:1200px;
    margin:auto;
    padding:0 20px 60px;
  }

  .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:28px;
  }

  .card{
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 4px 16px rgba(0,0,0,.08);
    transition:transform .2s ease, box-shadow .2s ease;
    display:flex;
    flex-direction:column;
  }

  .card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 24px rgba(0,0,0,.14);
  }

  .card-photo{
    position:relative;
    width:100%;
    height:220px;
    overflow:hidden;
    background:#dfe9e6;
  }

  .card-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .card-photo::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(20,40,35,.55) 100%);
  }

  .badge{
    position:absolute;
    top:14px;
    left:14px;
    z-index:2;
    background:var(--verde-brillante);
    color:var(--verde-header);
    padding:5px 12px;
    border-radius:20px;
    font-size:11px;
    font-weight:700;
    letter-spacing:.5px;
    text-transform:uppercase;
  }

  .card-content{
    padding:18px 18px 20px;
    flex:1;
    display:flex;
    flex-direction:column;
  }

  .card h2{
    margin:0 0 4px;
    font-size:19px;
  }

  .card h2 a{
    color:var(--verde-texto);
  }

  .card .subcategoria{
    font-size:12px;
    color:var(--gris-texto);
    text-transform:uppercase;
    letter-spacing:.5px;
    margin-bottom:10px;
    font-weight:600;
  }

  .card p.descripcion{
    font-size:14px;
    color:#4a4a4a;
    line-height:1.5;
    margin:0 0 10px;
    flex:1;
  }

  .card .cientifico{
    font-size:13px;
    color:var(--gris-texto);
    font-style:italic;
    border-top:1px solid #eef2f0;
    padding-top:10px;
    margin:0;
  }

  /* ===== FOOTER ===== */
  footer{
    background:var(--verde-header);
    color:#cfd9d6;
    text-align:center;
    padding:24px;
    font-size:13px;
  }

  /* ===== MENU TOGGLE (hamburguesa) ===== */
  .menu-toggle{
    background:rgba(255,255,255,.12);
    border:none;
    border-radius:8px;
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    order:-1;
  }

  .menu-toggle span,
  .menu-toggle span::before,
  .menu-toggle span::after{
    content:"";
    display:block;
    width:18px;
    height:2px;
    background:var(--verde-brillante);
    position:relative;
    transition:transform .2s ease, opacity .2s ease;
  }

  .menu-toggle span::before{ position:absolute; top:-6px; }
  .menu-toggle span::after{ position:absolute; top:6px; }

  body.sidebar-open .menu-toggle span{ background:transparent; }
  body.sidebar-open .menu-toggle span::before{ transform:rotate(45deg); top:0; }
  body.sidebar-open .menu-toggle span::after{ transform:rotate(-45deg); top:0; }

  /* ===== LAYOUT con sidebar ===== */
  .layout{
    display:flex;
    max-width:1400px;
    margin:0 auto;
    align-items:flex-start;
  }

  .main-content{
    flex:1;
    min-width:0;
  }

  /* ===== SIDEBAR ===== */
  .sidebar-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(10,20,18,.5);
    z-index:40;
  }

  body.sidebar-open .sidebar-overlay{ display:block; }

  .sidebar{
    width:280px;
    flex-shrink:0;
    background:white;
    border-right:1px solid #e7eee9;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
    padding:22px 0 40px;
  }

  .sidebar-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px 16px;
    border-bottom:1px solid #eef2f0;
    margin-bottom:10px;
  }

  .sidebar-header h3{
    margin:0;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--verde-texto);
  }

  .sidebar-close{
    display:none;
    background:none;
    border:none;
    font-size:20px;
    line-height:1;
    color:var(--gris-texto);
    cursor:pointer;
  }

  .cat-group{
    border-bottom:1px solid #f1f5f3;
  }

  .cat-toggle{
    width:100%;
    background:none;
    border:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:13px 20px;
    cursor:pointer;
    font-size:14px;
    font-weight:700;
    color:var(--verde-texto);
    text-align:left;
  }

  .cat-toggle .count{
    background:var(--crema);
    color:var(--gris-texto);
    font-size:11px;
    font-weight:600;
    padding:2px 8px;
    border-radius:12px;
    margin-left:8px;
  }

  .cat-toggle .arrow{
    margin-left:auto;
    transition:transform .2s ease;
    color:var(--verde-brillante);
    font-size:11px;
  }

  .cat-toggle.open .arrow{ transform:rotate(90deg); }

  .cat-name{
    display:flex;
    align-items:center;
    gap:6px;
  }

  .species-list{
    max-height:0;
    overflow:hidden;
    transition:max-height .25s ease;
    background:#fafdfb;
  }

  .species-list.open{
    max-height:1000px;
  }

  .species-list a{
    display:block;
    padding:9px 20px 9px 38px;
    font-size:13px;
    color:#3c4a46;
    border-top:1px solid #eef2f0;
  }

  .species-list a:hover{
    color:var(--verde-texto);
    background:#eef7ee;
  }

  /* ===== LIGHTBOX ===== */
  .card-photo{ cursor:zoom-in; }

  .lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(10,20,18,.92);
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .lightbox.open{
    display:flex;
  }

  .lightbox-box{
    position:relative;
    max-width:1000px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .lightbox-stage{
    position:relative;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .lightbox-stage img{
    max-width:100%;
    max-height:75vh;
    border-radius:10px;
    box-shadow:0 10px 40px rgba(0,0,0,.4);
    object-fit:contain;
    background:#0e1f1c;
  }

  .lightbox-close{
    position:absolute;
    top:-44px;
    right:0;
    background:rgba(255,255,255,.12);
    border:none;
    color:white;
    width:36px;
    height:36px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
    line-height:1;
  }

  .lightbox-close:hover{ background:var(--verde-brillante); color:var(--verde-header); }

  .lightbox-nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,.12);
    border:none;
    color:white;
    width:44px;
    height:44px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .lightbox-nav:hover{ background:var(--verde-brillante); color:var(--verde-header); }
  .lightbox-nav.prev{ left:-10px; }
  .lightbox-nav.next{ right:-10px; }

  .lightbox-caption{
    color:white;
    text-align:center;
    margin-top:16px;
  }

  .lightbox-caption .title{
    font-size:18px;
    font-weight:700;
    margin:0 0 4px;
  }

  .lightbox-caption .counter{
    font-size:13px;
    color:#a9bdb8;
    margin:0;
  }

  .lightbox-thumbs{
    display:flex;
    gap:8px;
    margin-top:16px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .lightbox-thumbs img{
    width:56px;
    height:56px;
    object-fit:cover;
    border-radius:6px;
    cursor:pointer;
    opacity:.55;
    border:2px solid transparent;
    transition:opacity .15s ease, border-color .15s ease;
  }

  .lightbox-thumbs img.active{
    opacity:1;
    border-color:var(--verde-brillante);
  }

  @media (max-width:700px){
    .lightbox-nav.prev{ left:0; }
    .lightbox-nav.next{ right:0; }
    .lightbox-stage img{ max-height:55vh; }
  }

  /* ===== SUBCATEGORÍAS EN SIDEBAR ===== */
  .subcat-group{ border-top:1px solid #f1f5f3; }

  .subcat-toggle{
    width:100%;
    background:none;
    border:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 20px 9px 32px;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    color:var(--gris-texto);
    text-align:left;
    gap:6px;
  }
  .subcat-toggle .count{
    background:var(--crema);
    color:var(--gris-texto);
    font-size:10px;
    padding:1px 6px;
    border-radius:10px;
    margin-left:4px;
  }
  .subcat-toggle .arrow{
    margin-left:auto;
    font-size:9px;
    color:var(--verde-brillante);
    transition:transform .2s ease;
  }
  .subcat-toggle.open .arrow{ transform:rotate(90deg); }
  .subcat-toggle:hover{ color:var(--verde-texto); background:#f5faf5; }

  /* Indentación progresiva según profundidad (depth-1 = subcategoría directa, depth-4 = más profundo) */
  .subcat-toggle.depth-1{ padding-left:32px; }
  .subcat-toggle.depth-2{ padding-left:44px; font-size:12px; }
  .subcat-toggle.depth-3{ padding-left:56px; font-size:11px; }
  .subcat-toggle.depth-4{ padding-left:68px; font-size:11px; }

  .subspecies-list{
    max-height:0;
    overflow:hidden;
    transition:max-height .25s ease;
    background:#f9fcfa;
  }
  .subspecies-list.open{ max-height:2000px; }

  .subspecies-list .species-link{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 20px 8px 46px;
    font-size:12px;
    color:#3c4a46;
    border-top:1px solid #eef2f0;
    text-decoration:none;
  }
  .subspecies-list .species-link.depth-1{ padding-left:46px; }
  .subspecies-list .species-link.depth-2{ padding-left:58px; }
  .subspecies-list .species-link.depth-3{ padding-left:70px; }
  .subspecies-list .species-link.depth-4{ padding-left:82px; }
  .subspecies-list .species-link:hover{ color:var(--verde-texto); background:#eef7ee; }

  /* Especie directa en species-list (sin subcat) */
  .species-list > .species-link{
    display:flex;
    align-items:center;
    gap:8px;
    padding:9px 20px 9px 38px;
    font-size:13px;
    color:#3c4a46;
    border-top:1px solid #eef2f0;
    text-decoration:none;
  }
  .species-list > .species-link:hover{ color:var(--verde-texto); background:#eef7ee; }

  /* Puntito verde que identifica que el enlace es una especie (hoja del árbol) */
  .species-link::before{
    content:"";
    display:inline-block;
    width:6px;
    height:6px;
    min-width:6px;
    border-radius:50%;
    background:var(--verde-brillante);
    flex-shrink:0;
  }

  /* Filtro activo */
  .active-filter{
    color:var(--verde-texto) !important;
    background:#eef7ee !important;
  }

  /* Contador de fotos en tarjeta */
  .photo-counter{
    position:absolute;
    bottom:10px;
    right:10px;
    z-index:3;
    background:rgba(10,30,20,.65);
    color:#fff;
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:12px;
    pointer-events:none;
  }

  @media (max-width:700px){
    .top-header{ padding:14px 20px; }
    .top-nav{ gap:14px; }
    .top-nav a{ display:none; }
    .hero{ padding:60px 20px; min-height:auto; }
    .hero h1{ font-size:38px; }
    .hero .subtitle{ font-size:18px; }
    .hero-stats{ gap:14px 22px; font-size:14px; }
    .hero-stats strong{ font-size:18px; }

    .sidebar{
      position:fixed;
      top:0;
      left:0;
      height:100vh;
      width:280px;
      max-width:80vw;
      transform:translateX(-100%);
      transition:transform .25s ease;
      z-index:50;
      box-shadow:4px 0 18px rgba(0,0,0,.15);
    }

    body.sidebar-open .sidebar{ transform:translateX(0); }
    .sidebar-close{ display:block; }
  }

  @media (min-width:701px){
    .menu-toggle{ display:none; }
  }
</style>
</head>
<body>

<div class="top-header">
  <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú de categorías"><span></span></button>
  <div class="logo">Tibirita Bio</div>
  <div class="top-nav">
    <a href="colecciones.html">Colecciones</a>
    <a href="#listas">Listas</a>
    <div class="search-box">
      <input type="text" placeholder="Buscar especie...">
      <button aria-label="Buscar">🔍</button>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="hero">
  <div class="hero-inner">
    <h1>Aprender,<br>Explorar, Valorar</h1>
    <p class="subtitle">la magnífica diversidad de la fauna de Tibirita, Cundinamarca</p>
    <div class="hero-stats" id="heroStats">
      <!-- llenado por JS -->
    </div>
  </div>
</div>

<div class="layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>Categorías</h3>
      <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú">&times;</button>
    </div>

    <!-- Categorías y especies se generan por JS desde data.json -->
    <div id="sidebarCategories"></div>
  </aside>

  <div class="main-content">

    <div class="section-title">
      <h2>CATÁLOGO DE FAUNA</h2>
      <span id="totalCount"></span>
    </div>

    <div class="container">
      <div class="gallery" id="gallery">
        <!-- tarjetas generadas por JS desde data.json -->
      </div>
    </div>

    <footer>
      Biodiversidad de Tibirita &middot; Catálogo de fauna observada en Tibirita, Cundinamarca
    </footer>

  </div><!-- /.main-content -->

</div><!-- /.layout -->

<div class="lightbox" id="lightbox">
  <div class="lightbox-box">
    <button class="lightbox-close" id="lightboxClose" aria-label="Cerrar">&times;</button>
    <div class="lightbox-stage">
      <button class="lightbox-nav prev" id="lightboxPrev" aria-label="Anterior">&#8249;</button>
      <img id="lightboxImg" src="" alt="">
      <button class="lightbox-nav next" id="lightboxNext" aria-label="Siguiente">&#8250;</button>
    </div>
    <div class="lightbox-caption">
      <p class="title" id="lightboxTitle"></p>
      <p class="counter" id="lightboxCounter"></p>
    </div>
    <div class="lightbox-thumbs" id="lightboxThumbs"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// Biodiversidad de Tibirita — app.js inline
// Lee data.json y construye sidebar + galería
// ═══════════════════════════════════════════

(function () {
  'use strict';

  var DB = { categories: [], species: [] };
  var activeFilter = null; // null = todos

  // ── CONFIG: repo de GitHub donde Decap guarda el contenido ──
  var GH_USER   = 'insecterik';
  var GH_REPO   = 'insecterik.github.io';
  var GH_BRANCH = 'main';
  var GH_API    = 'https://api.github.com/repos/' + GH_USER + '/' + GH_REPO + '/contents/';
  var GH_RAW    = 'https://raw.githubusercontent.com/' + GH_USER + '/' + GH_REPO + '/' + GH_BRANCH + '/';

  // ── MINI PARSER DE FRONT MATTER YAML ─────
  // Soporta: claves simples, listas en bloque ("- valor") y valores entre comillas.
  function parseFrontMatter(raw) {
    raw = raw.replace(/\r\n/g, '\n'); // normaliza saltos de línea Windows (CRLF) a Unix (LF)
    var match = /^---\s*\n([\s\S]*?)\n---/.exec(raw);
    if (!match) return {};
    var lines = match[1].split('\n');
    var data = {};
    var currentKey = null;

    lines.forEach(function (line) {
      if (!line.trim()) return;

      var listItem = /^\s*-\s+(.*)$/.exec(line);
      if (listItem && currentKey) {
        if (!Array.isArray(data[currentKey])) data[currentKey] = [];
        data[currentKey].push(cleanValue(listItem[1]));
        return;
      }

      var kv = /^([A-Za-z0-9_]+):\s*(.*)$/.exec(line);
      if (kv) {
        var key = kv[1];
        var val = kv[2].trim();
        if (val === '') {
          // Probablemente el inicio de una lista en las líneas siguientes
          currentKey = key;
          data[key] = [];
        } else {
          data[key] = cleanValue(val);
          currentKey = null;
        }
      }
    });

    return data;
  }

  function cleanValue(v) {
    v = v.trim();
    if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
      v = v.slice(1, -1);
    }
    return v;
  }

  function slugify(str) {
    return (str || '')
      .toString()
      .trim()
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // quita tildes
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '');
  }

  // Lista los archivos .md de una carpeta del repo usando la API de GitHub
  function listMdFiles(folder) {
    return fetch(GH_API + folder + '?ref=' + GH_BRANCH)
      .then(function (r) {
        if (!r.ok) throw new Error('No se pudo listar ' + folder + ' (HTTP ' + r.status + ')');
        return r.json();
      })
      .then(function (items) {
        return (items || [])
          .filter(function (it) { return it.type === 'file' && /\.md$/i.test(it.name); })
          .map(function (it) { return folder + '/' + it.name; });
      });
  }

  // Descarga y parsea el front matter de una lista de rutas .md
  function fetchAndParseAll(paths) {
    return Promise.all(paths.map(function (path) {
      return fetch(GH_RAW + path + '?v=' + Date.now())
        .then(function (r) {
          if (!r.ok) throw new Error('No se pudo leer ' + path);
          return r.text();
        })
        .then(function (raw) {
          var fm = parseFrontMatter(raw);
          fm.__path = path;
          return fm;
        });
    }));
  }

  // ── CARGA DE CONTENIDO DESDE content/*.md (vía GitHub) ──────
  // Niveles, de más general a más específico. El orden importa: define
  // qué campo "padre" se prioriza si por error hay más de uno relleno.
  var LEVELS = [
    { folder: 'content/reinos',        parentFields: [] },
    { folder: 'content/grupos',        parentFields: ['reino'] },
    { folder: 'content/subgrupos',     parentFields: ['grupo', 'reino'] },
    { folder: 'content/categorias',    parentFields: ['subgrupo', 'grupo', 'reino'] },
    { folder: 'content/subcategorias', parentFields: ['categoria', 'subgrupo', 'grupo', 'reino'] }
  ];
  var SPECIES_PARENT_FIELDS = ['subcategoria', 'categoria', 'subgrupo', 'grupo', 'reino'];

  Promise.all(
    LEVELS.map(function (lvl) { return listMdFiles(lvl.folder).then(fetchAndParseAll); })
      .concat([listMdFiles('content/especies').then(fetchAndParseAll)])
  )
    .then(function (results) {
      var categories = [];

      // Construye cada nivel de categorías (reinos, grupos, subgrupos, categorias, subcategorias)
      LEVELS.forEach(function (lvl, idx) {
        var rawItems = results[idx];
        rawItems.forEach(function (item) {
          var parentName = null;
          for (var i = 0; i < lvl.parentFields.length; i++) {
            if (item[lvl.parentFields[i]]) { parentName = item[lvl.parentFields[i]]; break; }
          }
          categories.push({
            id: slugify(item.title),
            parentId: parentName ? slugify(parentName) : null,
            name: item.title || '(sin nombre)',
            description: item.descripcion || '',
            image: item.imagen || ''
          });
        });
      });

      // Especies: último elemento del array de resultados
      var rawEspecies = results[results.length - 1];
      var species = rawEspecies.map(function (sp) {
        var catId = null;
        for (var i = 0; i < SPECIES_PARENT_FIELDS.length; i++) {
          if (sp[SPECIES_PARENT_FIELDS[i]]) { catId = slugify(sp[SPECIES_PARENT_FIELDS[i]]); break; }
        }

        var imagenes = Array.isArray(sp.imagenes) ? sp.imagenes
                     : (sp.imagenes ? [sp.imagenes] : []);

        return {
          id: slugify(sp.title) + '-' + slugify(sp.__path),
          categoryId: catId,
          name: sp.title || '(sin nombre)',
          scientificName: sp.cientifico || '',
          description: sp.descripcion || '',
          location: sp.ubicacion || '',
          date: sp.fecha || '',
          photos: imagenes
        };
      });

      DB = { categories: categories, species: species };
      renderAll();
    })
    .catch(function (err) {
      console.error(err);
      document.getElementById('gallery').innerHTML =
        '<p style="padding:40px;color:#888;grid-column:1/-1">No se pudo cargar el contenido desde GitHub. ' +
        'Revisa la consola del navegador (F12) para más detalles, y verifica que las carpetas ' +
        '<code>content/reinos</code>, <code>content/grupos</code>, <code>content/subgrupos</code>, ' +
        '<code>content/categorias</code>, <code>content/subcategorias</code> y <code>content/especies</code> ' +
        'existan en el repositorio.</p>';
    });

  // ── RENDER PRINCIPAL ─────────────────────
  function renderAll() {
    renderHeroStats();
    renderSidebar();
    renderGallery(DB.species);
  }

  // ── HERO STATS ───────────────────────────
  function renderHeroStats() {
    var container = document.getElementById('heroStats');
    var total = DB.species.length;
    var html = '<div><strong>' + total + '</strong> especies registradas</div>';

    // Stats por categoría raíz
    DB.categories
      .filter(function (c) { return !c.parentId; })
      .forEach(function (cat) {
        var count = countSpeciesDeep(cat.id);
        if (count > 0) {
          html += '<div><strong>' + count + '</strong> ' + cat.name + '</div>';
        }
      });

    container.innerHTML = html;
    document.getElementById('totalCount').textContent = total + ' especies en total';
  }

  // ── SIDEBAR ──────────────────────────────
  function renderSidebar() {
    var container = document.getElementById('sidebarCategories');
    var html = '';

    // Enlace "Todas"
    html += '<div class="cat-group">' +
      '<button class="cat-toggle open" data-id="__all__">' +
      '<span class="cat-name">Todas las especies<span class="count">' + DB.species.length + '</span></span>' +
      '</button></div>';

    // Nodos raíz (sin padre) de cualquier nivel: reino, o grupo/subgrupo/categoría/subcategoría
    // que no tenga ningún ancestro definido.
    var roots = DB.categories.filter(function (c) { return !c.parentId; });
    roots.forEach(function (root) {
      html += renderCategoryNode(root, 0);
    });

    container.innerHTML = html;
    bindSidebarEvents();
  }

  // Genera el HTML de un nodo de categoría (cualquier nivel) y recursivamente sus hijos.
  // depth = 0 para nodos raíz, +1 por cada nivel de anidación (usado solo para clases CSS).
  function renderCategoryNode(node, depth) {
    var children = DB.categories.filter(function (c) { return c.parentId === node.id; });
    var directSpecies = DB.species.filter(function (s) { return s.categoryId === node.id; });
    var totalCount = countSpeciesDeep(node.id);

    var toggleClass = depth === 0 ? 'cat-toggle' : 'subcat-toggle depth-' + Math.min(depth, 4);
    var groupClass = depth === 0 ? 'cat-group' : 'subcat-group depth-' + Math.min(depth, 4);
    var listClass = depth === 0 ? 'species-list' : 'subspecies-list';
    var linkClass = depth === 0 ? 'species-link' : 'species-link deep depth-' + Math.min(depth, 4);

    var html = '<div class="' + groupClass + '">';
    html += '<button class="' + toggleClass + '" data-id="' + node.id + '">' +
      (node.icon || '') + ' ' + node.name +
      '<span class="count">' + totalCount + '</span>' +
      '<span class="arrow">▶</span>' +
      '</button>';

    html += '<div class="' + listClass + '">';

    // Hijos (recursivo, cualquier profundidad)
    children.forEach(function (child) {
      html += renderCategoryNode(child, depth + 1);
    });

    // Especies que pertenecen directamente a este nodo
    directSpecies.forEach(function (sp) {
      html += '<a href="especie.html?id=' + encodeURIComponent(sp.id) + '" class="' + linkClass + '" data-species-id="' + sp.id + '">' + sp.name + '</a>';
    });

    html += '</div></div>'; // lista + grupo
    return html;
  }

  function bindSidebarEvents() {
    // Acordeón categorías principales
    document.querySelectorAll('.cat-toggle').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var list = btn.nextElementSibling;
        var isOpen = btn.classList.contains('open');

        if (btn.dataset.id === '__all__') {
          activeFilter = null;
          renderGallery(DB.species);
          highlightActive(btn);
          return;
        }

        // toggle acordeón
        if (list) {
          btn.classList.toggle('open', !isOpen);
          list.classList.toggle('open', !isOpen);
        }

        // filtrar por categoría raíz (incluye subcategorías)
        activeFilter = btn.dataset.id;
        var ids = getAllDescendantIds(btn.dataset.id);
        renderGallery(DB.species.filter(function (s) { return ids.includes(s.categoryId); }));
        highlightActive(btn);
      });
    });

    // Acordeón subcategorías
    document.querySelectorAll('.subcat-toggle').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var list = btn.nextElementSibling;
        var isOpen = btn.classList.contains('open');
        btn.classList.toggle('open', !isOpen);
        if (list) list.classList.toggle('open', !isOpen);

        // filtrar por subcategoría
        activeFilter = btn.dataset.id;
        var ids = getAllDescendantIds(btn.dataset.id);
        renderGallery(DB.species.filter(function (s) { return ids.includes(s.categoryId); }));
        highlightActive(btn);
      });
    });

    // Click en especie individual → navega a su página de detalle (especie.html?id=...)
    // El propio href ya apunta ahí; solo cerramos el sidebar en móvil antes de salir.
    document.querySelectorAll('.species-link').forEach(function (a) {
      a.addEventListener('click', function () {
        closeSidebar();
      });
    });

    // Abrir primera categoría raíz automáticamente
    var firstToggle = document.querySelector('.cat-group:nth-child(2) .cat-toggle');
    if (firstToggle) firstToggle.click();
  }

  function highlightActive(el) {
    document.querySelectorAll('.cat-toggle, .subcat-toggle, .species-link')
      .forEach(function (e) { e.classList.remove('active-filter'); });
    el.classList.add('active-filter');
  }

  // ── GALERÍA ──────────────────────────────
  function renderGallery(species) {
    var gallery = document.getElementById('gallery');
    document.getElementById('totalCount').textContent = species.length + ' especie' + (species.length !== 1 ? 's' : '') + ' en total';

    if (!species.length) {
      gallery.innerHTML = '<p style="padding:40px;color:#888;grid-column:1/-1">No hay especies en esta categoría aún.</p>';
      return;
    }

    gallery.innerHTML = '';
    species.forEach(function (sp) {
      var cat = DB.categories.find(function (c) { return c.id === sp.categoryId; });
      var catPath = getCatPath(sp.categoryId);
      var photos = sp.photos || [];

      var card = document.createElement('div');
      card.className = 'card';

      // Foto principal
      var photoDiv = document.createElement('div');
      photoDiv.className = 'card-photo';
      if (photos.length) {
        photoDiv.setAttribute('data-images', JSON.stringify(photos));
        photoDiv.setAttribute('data-title', sp.name);
        photoDiv.style.cursor = 'zoom-in';

        var badge = document.createElement('div');
        badge.className = 'badge';
        badge.textContent = cat ? cat.name : '';
        photoDiv.appendChild(badge);

        // Contador de fotos
        if (photos.length > 1) {
          var cnt = document.createElement('span');
          cnt.className = 'photo-counter';
          cnt.textContent = '📷 ' + photos.length;
          photoDiv.appendChild(cnt);
        }

        var img = document.createElement('img');
        img.src = photos[0];
        img.alt = sp.name;
        img.loading = 'lazy';
        photoDiv.appendChild(img);
      } else {
        // Placeholder sin foto
        photoDiv.style.display = 'flex';
        photoDiv.style.alignItems = 'center';
        photoDiv.style.justifyContent = 'center';
        photoDiv.style.fontSize = '3rem';
        photoDiv.textContent = cat ? (cat.icon || '🌿') : '🌿';
        var badge2 = document.createElement('div');
        badge2.className = 'badge';
        badge2.textContent = cat ? cat.name : '';
        photoDiv.insertBefore(badge2, photoDiv.firstChild);
      }

      // Contenido de texto
      var content = document.createElement('div');
      content.className = 'card-content';

      // Ruta de categoría (ej: Aves > Colibríes)
      if (catPath) {
        var subDiv = document.createElement('div');
        subDiv.className = 'subcategoria';
        subDiv.textContent = catPath;
        content.appendChild(subDiv);
      }

      var h2 = document.createElement('h2');
      var a = document.createElement('a');
      a.href = 'especie.html?id=' + encodeURIComponent(sp.id);
      a.textContent = sp.name;
      h2.appendChild(a);
      content.appendChild(h2);

      if (sp.description) {
        var desc = document.createElement('p');
        desc.className = 'descripcion';
        desc.textContent = sp.description;
        content.appendChild(desc);
      }

      if (sp.scientificName) {
        var sci = document.createElement('p');
        sci.className = 'cientifico';
        sci.textContent = sp.scientificName;
        content.appendChild(sci);
      }

      card.appendChild(photoDiv);
      card.appendChild(content);
      gallery.appendChild(card);
    });

    // Re-bind lightbox en las nuevas tarjetas
    bindLightboxCards();
  }

  // ── HELPERS ──────────────────────────────
  function getAllDescendantIds(catId) {
    var ids = [catId];
    DB.categories.filter(function (c) { return c.parentId === catId; }).forEach(function (c) {
      ids = ids.concat(getAllDescendantIds(c.id));
    });
    return ids;
  }

  function countSpeciesDeep(catId) {
    return DB.species.filter(function (s) { return getAllDescendantIds(catId).includes(s.categoryId); }).length;
  }

  function getCatPath(catId) {
    var parts = [];
    var cur = DB.categories.find(function (c) { return c.id === catId; });
    while (cur) {
      parts.unshift(cur.name);
      cur = cur.parentId ? DB.categories.find(function (c) { return c.id === cur.parentId; }) : null;
    }
    // Solo mostramos desde el nivel 2 en adelante (sin repetir la categoría raíz que ya está en el badge)
    return parts.length > 1 ? parts.join(' › ') : '';
  }

  // ── SIDEBAR MÓVIL ────────────────────────
  var body = document.body;
  var menuToggle = document.getElementById('menuToggle');
  var sidebarCloseBtn = document.getElementById('sidebarClose');
  var sidebarOverlay = document.getElementById('sidebarOverlay');

  function closeSidebar() { body.classList.remove('sidebar-open'); }

  if (menuToggle)      menuToggle.addEventListener('click', function () { body.classList.add('sidebar-open'); });
  if (sidebarCloseBtn) sidebarCloseBtn.addEventListener('click', closeSidebar);
  if (sidebarOverlay)  sidebarOverlay.addEventListener('click', closeSidebar);

  // ── BÚSQUEDA ─────────────────────────────
  var searchInput = document.querySelector('.search-box input');
  if (searchInput) {
    searchInput.addEventListener('input', function () {
      var q = searchInput.value.trim().toLowerCase();
      if (!q) { renderGallery(DB.species); return; }
      renderGallery(DB.species.filter(function (s) {
        return (s.name || '').toLowerCase().includes(q) ||
               (s.scientificName || '').toLowerCase().includes(q) ||
               (s.description || '').toLowerCase().includes(q);
      }));
    });

    document.querySelector('.search-box button').addEventListener('click', function () {
      searchInput.dispatchEvent(new Event('input'));
    });
  }

  // ── LIGHTBOX ─────────────────────────────
  var lightbox  = document.getElementById('lightbox');
  var imgEl     = document.getElementById('lightboxImg');
  var titleEl   = document.getElementById('lightboxTitle');
  var counterEl = document.getElementById('lightboxCounter');
  var thumbsEl  = document.getElementById('lightboxThumbs');
  var btnClose  = document.getElementById('lightboxClose');
  var btnPrev   = document.getElementById('lightboxPrev');
  var btnNext   = document.getElementById('lightboxNext');

  var lbImages = [], lbIndex = 0, lbTitle = '';

  function lbRender() {
    if (!lbImages.length) return;
    imgEl.src = lbImages[lbIndex];
    imgEl.alt = lbTitle;
    titleEl.textContent = lbTitle;
    counterEl.textContent = (lbIndex + 1) + ' / ' + lbImages.length;
    thumbsEl.querySelectorAll('img').forEach(function (t, i) { t.classList.toggle('active', i === lbIndex); });
    var multi = lbImages.length > 1;
    btnPrev.style.display = multi ? 'flex' : 'none';
    btnNext.style.display = multi ? 'flex' : 'none';
    thumbsEl.style.display = multi ? 'flex' : 'none';
  }

  function openLightbox(images, title, start) {
    lbImages = images; lbTitle = title; lbIndex = start || 0;
    thumbsEl.innerHTML = '';
    images.forEach(function (src, i) {
      var t = document.createElement('img');
      t.src = src; t.alt = title + ' ' + (i + 1);
      t.addEventListener('click', function () { lbIndex = i; lbRender(); });
      thumbsEl.appendChild(t);
    });
    lbRender();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() { lightbox.classList.remove('open'); document.body.style.overflow = ''; }

  btnClose.addEventListener('click', closeLightbox);
  btnPrev.addEventListener('click', function () { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; lbRender(); });
  btnNext.addEventListener('click', function () { lbIndex = (lbIndex + 1) % lbImages.length; lbRender(); });
  lightbox.addEventListener('click', function (e) { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', function (e) {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; lbRender(); }
    if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % lbImages.length; lbRender(); }
  });

  function bindLightboxCards() {
    document.querySelectorAll('.card-photo[data-images]').forEach(function (photo) {
      // evitar doble-bind
      if (photo._lbBound) return;
      photo._lbBound = true;
      photo.addEventListener('click', function () {
        var list;
        try { list = JSON.parse(photo.getAttribute('data-images')); } catch (e) { list = []; }
        if (!list.length) return;
        openLightbox(list, photo.getAttribute('data-title') || '', 0);
      });
    });
  }

})();
</script>

</body>
</html>
