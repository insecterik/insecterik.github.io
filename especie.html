<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitleTag">Especie &middot; Biodiversidad de Tibirita</title>
<link rel="icon" type="image/png" href="images/uploads/favicon.png">


<style>
  :root{
    --verde-oscuro:#1c3f3a;
    --verde-header:#16332f;
    --verde-brillante:#2ecc71;
    --verde-texto:#1b5e20;
    --crema:#f4f8f2;
    --gris-texto:#5a6b66;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:var(--crema);
    color:#222;
  }

  a{ text-decoration:none; }

  /* ===== HEADER ===== */
  .top-header{
    background:var(--verde-header);
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 40px;
    flex-wrap:wrap;
    gap:12px;
  }

  .logo{ display:flex; align-items:center; gap:10px; }

  .logo-img{ height:96px; width:96px; object-fit:contain; border-radius:6px; }

  .logo-text{ display:flex; align-items:center; line-height:1; }

    .logo{
    color:var(--verde-brillante);
    font-weight:800;
    font-size:22px;
    letter-spacing:1px;
    }

  .top-nav{
    display:flex;
    align-items:center;
    gap:28px;
  }

  .top-nav a{
    color:#dfe9e6;
    font-size:13px;
    letter-spacing:.5px;
    text-transform:uppercase;
    font-weight:600;
  }

  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:var(--verde-brillante) !important;
  }

  /* ===== BREADCRUMB ===== */
  .breadcrumb{
    max-width:1100px;
    margin:24px auto 0;
    padding:0 24px;
    font-size:13px;
    color:var(--gris-texto);
  }

  .breadcrumb a{
    color:var(--verde-texto);
    font-weight:600;
  }

  /* ===== HERO GALLERY ===== */
  .species-hero{
    max-width:1100px;
    margin:18px auto 0;
    padding:0 24px;
    display:grid;
    grid-template-columns:1.6fr 1fr;
    gap:24px;
  }

  .species-main-photo{
    position:relative;
    height:440px;
    border-radius:18px;
    overflow:hidden;
    background:#dfe9e6;
    cursor:zoom-in;
  }

  .species-main-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:transform .3s ease;
  }

  .species-main-photo:hover img{
    transform:scale(1.03);
  }

  .species-main-photo .zoom-hint{
    position:absolute;
    bottom:14px;
    right:14px;
    background:rgba(10,20,18,.65);
    color:white;
    font-size:12px;
    padding:6px 12px;
    border-radius:20px;
    display:flex;
    align-items:center;
    gap:6px;
  }

  .species-thumbs-col{
    display:grid;
    grid-template-rows:repeat(2, 1fr);
    gap:24px;
  }

  .species-thumbs-col .thumb{
    position:relative;
    border-radius:18px;
    overflow:hidden;
    background:#dfe9e6;
    cursor:zoom-in;
    height:208px;
  }

  .species-thumbs-col .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:transform .3s ease;
  }

  .species-thumbs-col .thumb:hover img{
    transform:scale(1.05);
  }

  .species-thumbs-col .thumb.more::after{
    content:attr(data-more);
    position:absolute;
    inset:0;
    background:rgba(10,20,18,.55);
    color:white;
    font-size:22px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  @media (max-width:780px){
    .species-hero{
      grid-template-columns:1fr;
    }
    .species-main-photo{ height:300px; }
    .species-thumbs-col{
      grid-template-rows:none;
      grid-template-columns:1fr 1fr;
    }
    .species-thumbs-col .thumb{ height:140px; }
  }

  /* ===== INFO SECTION ===== */
  .species-info{
    max-width:1100px;
    margin:36px auto 60px;
    padding:0 24px;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:32px;
    align-items:start;
  }

  @media (max-width:780px){
    .species-info{ grid-template-columns:1fr; }
  }

  .species-badge{
    display:inline-block;
    background:var(--verde-brillante);
    color:var(--verde-header);
    padding:5px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.5px;
    text-transform:uppercase;
    margin-bottom:14px;
  }

  .species-title{
    font-size:38px;
    font-weight:800;
    color:var(--verde-texto);
    margin:0 0 4px;
    text-transform:capitalize;
  }

  .species-scientific{
    font-size:16px;
    font-style:italic;
    color:var(--gris-texto);
    margin:0 0 22px;
  }

  .species-description p{
    font-size:16px;
    line-height:1.7;
    color:#3c4a46;
    margin:0 0 16px;
  }

  /* ===== DATA CARD ===== */
  .data-card{
    background:white;
    border-radius:16px;
    box-shadow:0 4px 16px rgba(0,0,0,.08);
    padding:22px 24px;
  }

  .data-card h3{
    margin:0 0 16px;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--verde-texto);
    border-bottom:1px solid #eef2f0;
    padding-bottom:12px;
  }

  .data-row{
    display:flex;
    justify-content:space-between;
    gap:12px;
    padding:10px 0;
    border-bottom:1px solid #f4f7f5;
    font-size:14px;
  }

  .data-row:last-child{ border-bottom:none; }

  .data-row .label{
    color:var(--gris-texto);
    font-weight:600;
  }

  .data-row .value{
    color:#222;
    text-align:right;
    text-transform:capitalize;
  }

  .back-button{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:20px;
    color:var(--verde-texto);
    font-weight:700;
    font-size:14px;
  }

  .back-button:hover{ text-decoration:underline; }

  /* ===== FOOTER ===== */
  footer{
    background:var(--verde-header);
    color:#cfd9d6;
    text-align:center;
    padding:24px;
    font-size:13px;
  }

  /* ===== LIGHTBOX (igual al del catálogo) ===== */
  .lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(10,20,18,.92);
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .lightbox.open{ display:flex; }

  .lightbox-box{
    position:relative;
    max-width:1000px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .lightbox-stage{
    position:relative;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .lightbox-stage img{
    max-width:100%;
    max-height:75vh;
    border-radius:10px;
    box-shadow:0 10px 40px rgba(0,0,0,.4);
    object-fit:contain;
    background:#0e1f1c;
  }

  .lightbox-close{
    position:absolute;
    top:-44px;
    right:0;
    background:rgba(255,255,255,.12);
    border:none;
    color:white;
    width:36px;
    height:36px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
    line-height:1;
  }

  .lightbox-close:hover{ background:var(--verde-brillante); color:var(--verde-header); }

  .lightbox-nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,.12);
    border:none;
    color:white;
    width:44px;
    height:44px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .lightbox-nav:hover{ background:var(--verde-brillante); color:var(--verde-header); }
  .lightbox-nav.prev{ left:-10px; }
  .lightbox-nav.next{ right:-10px; }

  .lightbox-caption{
    color:white;
    text-align:center;
    margin-top:16px;
  }

  .lightbox-caption .title{
    font-size:18px;
    font-weight:700;
    margin:0 0 4px;
    text-transform:capitalize;
  }

  .lightbox-caption .counter{
    font-size:13px;
    color:#a9bdb8;
    margin:0;
  }

  .lightbox-thumbs{
    display:flex;
    gap:8px;
    margin-top:16px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .lightbox-thumbs img{
    width:56px;
    height:56px;
    object-fit:cover;
    border-radius:6px;
    cursor:pointer;
    opacity:.55;
    border:2px solid transparent;
    transition:opacity .15s ease, border-color .15s ease;
  }

  .lightbox-thumbs img.active{
    opacity:1;
    border-color:var(--verde-brillante);
  }

  @media (max-width:700px){
    .lightbox-nav.prev{ left:0; }
    .lightbox-nav.next{ right:0; }
    .lightbox-stage img{ max-height:55vh; }
  }
</style>
</head>
<body>

<div class="top-header">
  <a class="logo" href="/"><img src="images/uploads/logo.png" alt="InsectErik logo" class="logo-img"><span class="logo-text">InsectErik</span></a>
  <div class="top-nav">
    <a class="back-link" href="/">&#8592; Volver al catálogo</a>
  </div>
</div>

<div class="breadcrumb" id="breadcrumb">
  <a href="/">Catálogo</a> / <span id="breadcrumbCurrent">Cargando&hellip;</span>
</div>

<div class="species-hero" id="speciesHero"></div>

<div class="species-info">
  <div>
    <div id="speciesTextBlock">
      <span class="species-badge" id="speciesBadge" style="display:none;"></span>
      <h1 class="species-title" id="speciesTitle">Cargando especie&hellip;</h1>
      <p class="species-scientific" id="speciesScientific" style="display:none;"></p>
      <div class="species-description" id="speciesDescription"></div>
    </div>
  </div>

  <div class="data-card" id="taxonomyCard" style="display:none; margin-bottom:18px;">
    <h3>Clasificación</h3>
    <div id="taxonomyRows"></div>
  </div>

  <div class="data-card">
    <h3>Ficha técnica</h3>
    <div id="dataCardRows"></div>
    <a class="back-button" href="/">&#8592; Ver más especies</a>
  </div>
</div>

<footer>
  Biodiversidad de Tibirita &middot; Catálogo de fauna observada en Tibirita, Cundinamarca
</footer>

<div class="lightbox" id="lightbox">
  <div class="lightbox-box">
    <button class="lightbox-close" id="lightboxClose" aria-label="Cerrar">&times;</button>
    <div class="lightbox-stage">
      <button class="lightbox-nav prev" id="lightboxPrev" aria-label="Anterior">&#8249;</button>
      <img id="lightboxImg" src="" alt="">
      <button class="lightbox-nav next" id="lightboxNext" aria-label="Siguiente">&#8250;</button>
    </div>
    <div class="lightbox-caption">
      <p class="title" id="lightboxTitle"></p>
      <p class="counter" id="lightboxCounter"></p>
    </div>
    <div class="lightbox-thumbs" id="lightboxThumbs"></div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ── CONFIG: mismo repo que usa index.html ──
  var GH_USER   = 'insecterik';
  var GH_REPO   = 'insecterik.github.io';
  var GH_BRANCH = 'main';
  var GH_API    = 'https://api.github.com/repos/' + GH_USER + '/' + GH_REPO + '/contents/';
  var GH_RAW    = 'https://raw.githubusercontent.com/' + GH_USER + '/' + GH_REPO + '/' + GH_BRANCH + '/';

  // ── MINI PARSER DE FRONT MATTER YAML (igual al de index.html) ──
  function parseFrontMatter(raw) {
    raw = raw.replace(/\r\n/g, '\n');
    var match = /^---\s*\n([\s\S]*?)\n---/.exec(raw);
    if (!match) return {};
    var lines = match[1].split('\n');
    var data = {};
    var currentKey = null;

    lines.forEach(function (line) {
      if (!line.trim()) return;

      var listItem = /^\s*-\s+(.*)$/.exec(line);
      if (listItem && currentKey) {
        if (!Array.isArray(data[currentKey])) data[currentKey] = [];
        data[currentKey].push(cleanValue(listItem[1]));
        return;
      }

      var kv = /^([A-Za-z0-9_]+):\s*(.*)$/.exec(line);
      if (kv) {
        var key = kv[1];
        var val = kv[2].trim();
        if (val === '') {
          currentKey = key;
          data[key] = [];
        } else {
          data[key] = cleanValue(val);
          currentKey = null;
        }
      }
    });

    return data;
  }

  function cleanValue(v) {
    v = v.trim();
    if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
      v = v.slice(1, -1);
    }
    return v;
  }

  function slugify(str) {
    return (str || '')
      .toString()
      .trim()
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '');
  }

  function capitalize(str) {
    str = str || '';
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  function listMdFiles(folder) {
    return fetch(GH_API + folder + '?ref=' + GH_BRANCH)
      .then(function (r) {
        if (!r.ok) throw new Error('No se pudo listar ' + folder + ' (HTTP ' + r.status + ')');
        return r.json();
      })
      .then(function (items) {
        return (items || [])
          .filter(function (it) { return it.type === 'file' && /\.md$/i.test(it.name); })
          .map(function (it) { return folder + '/' + it.name; });
      });
  }

  function fetchAndParseAll(paths) {
    return Promise.all(paths.map(function (path) {
      return fetch(GH_RAW + path + '?v=' + Date.now())
        .then(function (r) {
          if (!r.ok) throw new Error('No se pudo leer ' + path);
          return r.text();
        })
        .then(function (raw) {
          var fm = parseFrontMatter(raw);
          fm.__path = path;
          return fm;
        });
    }));
  }

  // ── ESTADO DE ERROR / "NO ENCONTRADO" ──
  function showError(message) {
    document.getElementById('speciesTitle').textContent = 'No se encontró la especie';
    document.getElementById('breadcrumbCurrent').textContent = 'No encontrada';
    document.getElementById('speciesHero').style.display = 'none';
    document.querySelector('.data-card').style.display = 'none';
    var descEl = document.getElementById('speciesDescription');
    var p = document.createElement('p');
    p.style.color = '#a33';
    p.textContent = message;
    descEl.appendChild(p);
  }

  // ── LEER ?id= DE LA URL ──
  var params = new URLSearchParams(window.location.search);
  var targetId = params.get('id');

  if (!targetId) {
    showError('No se especificó ninguna especie en la URL (falta el parámetro ?id=).');
    return;
  }

  // ── CARGAR LOS 6 NIVELES (REINO → GRUPO → SUBGRUPO → CATEGORÍA → SUBCATEGORÍA) Y ESPECIES, IGUAL QUE EN index.html ──
  var LEVELS = [
    { folder: 'content/reinos',        parentFields: [] },
    { folder: 'content/grupos',        parentFields: ['reino'] },
    { folder: 'content/subgrupos',     parentFields: ['grupo', 'reino'] },
    { folder: 'content/categorias',    parentFields: ['subgrupo', 'grupo', 'reino'] },
    { folder: 'content/subcategorias', parentFields: ['categoria', 'subgrupo', 'grupo', 'reino'] }
  ];
  var SPECIES_PARENT_FIELDS = ['subcategoria', 'categoria', 'subgrupo', 'grupo', 'reino'];

  var LEVEL_LABELS = ['Reino', 'Grupo Principal', 'Subgrupo', 'Categoría', 'Subcategoría'];

  Promise.all(
    LEVELS.map(function (lvl) { return listMdFiles(lvl.folder).then(fetchAndParseAll); })
      .concat([listMdFiles('content/especies').then(fetchAndParseAll)])
  )
    .then(function (results) {
      var categories = [];

      LEVELS.forEach(function (lvl, idx) {
        var rawItems = results[idx];
        rawItems.forEach(function (item) {
          var parentName = null;
          for (var i = 0; i < lvl.parentFields.length; i++) {
            if (item[lvl.parentFields[i]]) { parentName = item[lvl.parentFields[i]]; break; }
          }
          categories.push({
            id: slugify(item.title),
            parentId: parentName ? slugify(parentName) : null,
            name: item.title || '(sin nombre)',
            levelLabel: LEVEL_LABELS[idx],
            description: item.descripcion || '',
            image: item.imagen || ''
          });
        });
      });

      var rawEspecies = results[results.length - 1];
      var species = rawEspecies.map(function (sp) {
        var catId = null;
        for (var i = 0; i < SPECIES_PARENT_FIELDS.length; i++) {
          if (sp[SPECIES_PARENT_FIELDS[i]]) { catId = slugify(sp[SPECIES_PARENT_FIELDS[i]]); break; }
        }

        var imagenes = Array.isArray(sp.imagenes) ? sp.imagenes
                     : (sp.imagenes ? [sp.imagenes] : []);

        return {
          id: slugify(sp.title) + '-' + slugify(sp.__path),
          categoryId: catId,
          name: sp.title || '(sin nombre)',
          scientificName: sp.cientifico || '',
          description: sp.descripcion || '',
          location: sp.ubicacion || '',
          date: sp.fecha || '',
          photos: imagenes
        };
      });

      var sp = species.find(function (s) { return s.id === targetId; });

      if (!sp) {
        showError('La especie solicitada ya no existe o el enlace está desactualizado.');
        return;
      }

      renderSpecies(sp, categories);
    })
    .catch(function (err) {
      console.error(err);
      showError('No se pudo cargar la información desde GitHub. Revisa tu conexión e intenta de nuevo.');
    });

  // ── HELPERS DE RUTA DE CATEGORÍA (igual lógica que index.html, soporta cualquier profundidad) ──
  // Devuelve un array ordenado de raíz -> hoja, cada elemento: { name, levelLabel }
  function getCatPath(categories, catId) {
    var parts = [];
    var cur = categories.find(function (c) { return c.id === catId; });
    while (cur) {
      parts.unshift({ name: cur.name, levelLabel: cur.levelLabel });
      cur = cur.parentId ? categories.find(function (c) { return c.id === cur.parentId; }) : null;
    }
    return parts;
  }

  // ── RENDER PRINCIPAL DE LA PÁGINA DE ESPECIE ──
  function renderSpecies(sp, categories) {
    var titleText = capitalize(sp.name);
    var imgs = sp.photos || [];
    var catPath = getCatPath(categories, sp.categoryId); // ej: [{name:'Animalia',levelLabel:'Reino'}, {name:'Aves',levelLabel:'Grupo Principal'}, ...]
    var leafCat = catPath.length ? catPath[catPath.length - 1] : null; // nivel más específico, justo arriba de la especie

    // Título de pestaña, breadcrumb y encabezado
    document.getElementById('pageTitleTag').textContent = titleText + ' · Biodiversidad de Tibirita';
    document.getElementById('breadcrumbCurrent').textContent = titleText;
    document.getElementById('speciesTitle').textContent = titleText;

    // ----- 1. Galería principal (foto grande + miniaturas) -----
    var heroEl = document.getElementById('speciesHero');

    if (imgs.length) {
      var mainHtml = '<div class="species-main-photo" data-index="0">' +
                       '<img src="' + imgs[0] + '" alt="' + titleText + '">' +
                       '<span class="zoom-hint">&#128269; Ver en grande</span>' +
                     '</div>';

      var thumbsHtml = '';
      if (imgs.length > 1) {
        thumbsHtml += '<div class="species-thumbs-col">';
        var maxThumbs = 2;
        for (var i = 1; i < Math.min(imgs.length, maxThumbs + 1); i++) {
          var isLastVisible = (i === maxThumbs) && (imgs.length > maxThumbs + 1);
          thumbsHtml += '<div class="thumb' + (isLastVisible ? ' more' : '') + '"' +
                          (isLastVisible ? ' data-more="+' + (imgs.length - maxThumbs) + '"' : '') +
                          ' data-index="' + i + '">' +
                          '<img src="' + imgs[i] + '" alt="' + titleText + ' ' + (i + 1) + '">' +
                        '</div>';
        }
        thumbsHtml += '</div>';
      }

      heroEl.innerHTML = mainHtml + thumbsHtml;
    } else {
      heroEl.innerHTML = '<div class="species-main-photo" style="display:flex;align-items:center;justify-content:center;font-size:4rem;cursor:default;">🌿</div>';
    }

    // ----- 2. Badge: nivel más específico justo arriba de la especie -----
    var badgeEl = document.getElementById('speciesBadge');
    if (leafCat) {
      badgeEl.textContent = leafCat.name;
      badgeEl.style.display = 'inline-block';
    }

    // ----- 3. Nombre científico -----
    var sciEl = document.getElementById('speciesScientific');
    if (sp.scientificName) {
      sciEl.textContent = sp.scientificName;
      sciEl.style.display = 'block';
    }

    // ----- 4. Descripción -----
    var descEl = document.getElementById('speciesDescription');
    if (sp.description) {
      var p = document.createElement('p');
      p.textContent = sp.description;
      descEl.appendChild(p);
    } else {
      var pEmpty = document.createElement('p');
      pEmpty.style.color = '#8a9a95';
      pEmpty.textContent = 'Sin descripción registrada todavía.';
      descEl.appendChild(pEmpty);
    }

    // ----- 5. Clasificación taxonómica: un renglón por cada nivel presente -----
    var taxonomyCard = document.getElementById('taxonomyCard');
    var taxonomyRowsEl = document.getElementById('taxonomyRows');

    if (catPath.length) {
      catPath.forEach(function (part) {
        var row = document.createElement('div');
        row.className = 'data-row';
        row.innerHTML = '<span class="label"></span><span class="value"></span>';
        row.querySelector('.label').textContent = part.levelLabel || 'Nivel';
        row.querySelector('.value').textContent = part.name;
        taxonomyRowsEl.appendChild(row);
      });
      taxonomyCard.style.display = 'block';
    }

    // ----- 6. Ficha técnica (data-card) -----
    var dataCardEl = document.getElementById('dataCardRows').closest('.data-card');
    var dataRowsEl = document.getElementById('dataCardRows');
    var rows = [];

    if (sp.location) {
      rows.push({ label: 'Ubicación', value: sp.location });
    }
    if (sp.date) {
      var d = new Date(sp.date);
      var fechaTexto = isNaN(d.getTime()) ? sp.date : d.toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' });
      rows.push({ label: 'Fecha de observación', value: fechaTexto });
    }
    if (imgs.length) {
      rows.push({ label: 'Fotos registradas', value: String(imgs.length) });
    }

    rows.forEach(function (r) {
      var row = document.createElement('div');
      row.className = 'data-row';
      row.innerHTML = '<span class="label"></span><span class="value"></span>';
      row.querySelector('.label').textContent = r.label;
      row.querySelector('.value').textContent = r.value;
      dataRowsEl.appendChild(row);
    });

    if (!dataRowsEl.children.length) {
      dataCardEl.style.display = 'none';
    }

    // ----- 7. Lightbox -----
    initLightbox(imgs, titleText, heroEl);
  }

  // ── LIGHTBOX (igual al del catálogo) ──
  function initLightbox(imgs, titleText, heroEl) {
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightboxImg');
    var lightboxTitle = document.getElementById('lightboxTitle');
    var lightboxCounter = document.getElementById('lightboxCounter');
    var lightboxThumbs = document.getElementById('lightboxThumbs');
    var btnClose = document.getElementById('lightboxClose');
    var btnPrev = document.getElementById('lightboxPrev');
    var btnNext = document.getElementById('lightboxNext');

    var currentIndex = 0;

    function renderLightbox(){
      if (!imgs.length) return;
      lightboxImg.src = imgs[currentIndex];
      lightboxImg.alt = titleText;
      lightboxTitle.textContent = titleText;
      lightboxCounter.textContent = (currentIndex + 1) + ' / ' + imgs.length;

      lightboxThumbs.querySelectorAll('img').forEach(function(t, i){
        t.classList.toggle('active', i === currentIndex);
      });

      var multi = imgs.length > 1;
      btnPrev.style.display = multi ? 'flex' : 'none';
      btnNext.style.display = multi ? 'flex' : 'none';
      lightboxThumbs.style.display = multi ? 'flex' : 'none';
    }

    function openLightbox(startIndex){
      if (!imgs.length) return;
      currentIndex = startIndex || 0;

      lightboxThumbs.innerHTML = '';
      imgs.forEach(function(src, i){
        var t = document.createElement('img');
        t.src = src;
        t.alt = titleText + ' ' + (i + 1);
        t.addEventListener('click', function(){
          currentIndex = i;
          renderLightbox();
        });
        lightboxThumbs.appendChild(t);
      });

      renderLightbox();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(){
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function showPrev(){
      if (!imgs.length) return;
      currentIndex = (currentIndex - 1 + imgs.length) % imgs.length;
      renderLightbox();
    }

    function showNext(){
      if (!imgs.length) return;
      currentIndex = (currentIndex + 1) % imgs.length;
      renderLightbox();
    }

    heroEl.addEventListener('click', function(e){
      var target = e.target.closest('[data-index]');
      if (!target) return;
      openLightbox(parseInt(target.getAttribute('data-index'), 10));
    });

    btnClose.addEventListener('click', closeLightbox);
    btnPrev.addEventListener('click', showPrev);
    btnNext.addEventListener('click', showNext);

    lightbox.addEventListener('click', function(e){
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', function(e){
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') showPrev();
      if (e.key === 'ArrowRight') showNext();
    });
  }
})();
</script>
